name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write
  checks: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "Verificar y gestionar firma de CLA"
        if: |
          (github.event.comment.body == 'recheck' || 
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || 
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/hacker-programer/citybound/blob/master/refactor/CLA.md"
          branch: "master"
          allowlist: hacker-programer
          remote-organization-name: "hacker-programer"
          remote-repository-name: "citybound"
          create-file-commit-message: "docs: actualizar registros de firma de CLA"
          signed-commit-message: "docs: $contributorName ha firmado el CLA"
          custom-notsigned-prcomment: "⚠️ **Antes de fusionar este PR, debes firmar el [Acuerdo de Licencia de Colaborador (CLA)](https://github.com/hacker-programer/citybound/blob/master/refactor/CLA.md).** Para firmarlo, comenta en este PR: `I have read the CLA Document and I hereby sign the CLA`"
          custom-pr-sign-comment: "✅ **$contributorName ha firmado el CLA.** ¡Gracias por tu contribución!"
          custom-allsigned-prcomment: "✅ **Todos los colaboradores han firmado el CLA.** Este PR está listo para revisión."
          lock-pullrequest-aftermerge: false
          use-dco-flag: false